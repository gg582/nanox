[delphi]
extensions = pas,dpr,dfm,pp,lpr
line_comment_tokens = //
block_comment_pairs = { }, (* *)
string_delims = ",'
flow = if,then,else,for,to,downto,do,while,repeat,until,case,of,with,try,except,finally,raise
types = Integer,Cardinal,Shortint,Smallint,Longint,Int64,Byte,Word,LongWord,QWord,Single,Double,Extended,Currency,Boolean,Char,WideChar,AnsiChar,String,AnsiString,WideString,UnicodeString,Pointer,TObject
keywords = program,unit,library,package,uses,interface,implementation,initialization,finalization,begin,end,var,const,type,procedure,function,class,record,object,array,set,file,inherited,nil,true,false,and,or,not,in,is,as,xor,div,mod,abstract,virtual,override,overload,published,public,protected,private,property,read,write,default
return_keywords = Result,Exit
enable_number_highlight = true
enable_bracket_highlight = true
