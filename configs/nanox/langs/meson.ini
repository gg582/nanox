[meson]
extensions = meson
file_matches = ^meson\.build$,^meson_options\.txt$
line_comment_tokens = #
string_delims = ",'
flow = if,elif,else,endif,foreach,endforeach,break,continue
types = str,int,bool,list,dict,true,false
keywords = project,executable,library,shared_library,static_library,dependency,find_program,run_command,configure_file,custom_target,install_headers,install_man,install_data,test,benchmark,subdir,subproject,meson,import
enable_number_highlight = true
enable_bracket_highlight = true
