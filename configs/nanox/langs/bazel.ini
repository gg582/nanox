[bazel]
extensions = bazel,bzl
file_matches = ^BUILD$,^BUILD\.bazel$,^WORKSPACE$,^WORKSPACE\.bazel$
line_comment_tokens = #
string_delims = ",'
flow = if,else,for,while
types = str,int,bool,list,dict,tuple,None,True,False
keywords = load,def,pass,return,rule,attr,provider,depset,struct,glob,select,config_setting,genrule,filegroup,exports_files
return_keywords = return
enable_number_highlight = true
