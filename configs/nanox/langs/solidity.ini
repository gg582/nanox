[solidity]
extensions = sol
line_comment_tokens = //
block_comment_pairs = /* */
string_delims = ",'
flow = if,else,for,while,do,try,catch,revert,continue,break,return
types = int,int8,int16,int32,int64,int128,int256,uint,uint8,uint16,uint32,uint64,uint128,uint256,bytes,bytes1,bytes2,bytes4,bytes8,bytes16,bytes32,bool,string,address,payable
keywords = pragma,import,contract,library,interface,function,event,modifier,error,struct,enum,mapping,memory,storage,calldata,public,private,internal,external,view,pure,payable,virtual,override,abstract,emit,new,delete,this,super,abi,block,msg,tx
enable_number_highlight = true
enable_bracket_highlight = true
