[haxe]
extensions = hx,hxml
line_comment_tokens = //
block_comment_pairs = /* */
string_delims = ",',`
flow = if,else,for,while,do,switch,case,default,break,continue,return,try,catch,throw
types = Void,Bool,Int,Float,String,Dynamic,Null,Array,Map,Iterator,Iterable,Date,EReg,Class,Enum,EnumValue,IntIterator,Lambda
keywords = package,import,using,class,interface,enum,typedef,abstract,macro,extern,override,overload,inline,final,dynamic,static,public,private,extends,implements,new,this,super,var,function,in,is,cast,throw,untyped,never,null,true,false,trace
return_keywords = return
enable_number_highlight = true
