[hlsl]
extensions = hlsl,fx,fxh
line_comment_tokens = //
block_comment_pairs = /* */
string_delims = ",'
flow = if,else,for,while,do,switch,case,default,break,continue,return,discard
types = void,bool,int,uint,float,half,double,float2,float3,float4,int2,int3,int4,uint2,uint3,uint4,bool2,bool3,bool4,float2x2,float3x3,float4x4,Texture2D,Texture3D,TextureCube,RWTexture2D,Buffer,RWBuffer,SamplerState,SamplerComparisonState,StructuredBuffer,RWStructuredBuffer,ByteAddressBuffer,RWByteAddressBuffer,AppendStructuredBuffer,ConsumeStructuredBuffer
keywords = cbuffer,tbuffer,register,packoffset,groupshared,Technique,technique,pass,sampler,VertexShader,PixelShader,GeometryShader,ComputeShader,numthreads,SV_Position,SV_Target,SV_Depth,SV_VertexID,SV_InstanceID,SV_GroupID,SV_GroupThreadID,SV_DispatchThreadID,SV_Coverage,SV_IsFrontFace,normalize,dot,cross,length,reflect,refract,mul,lerp,clamp,step,smoothstep,saturate,abs,sin,cos,tan,sqrt,pow,log,exp,Sample,Load,Store,InterlockedAdd,AllMemoryBarrier,DeviceMemoryBarrier,GroupMemoryBarrier
return_keywords = return
preproc_include = include
preproc_define = define,undef
preproc_flow = ifdef,ifndef,endif,else,elif,pragma
enable_number_highlight = true
