[asm]
extensions = asm,nasm
line_comment_tokens = ;,#
string_delims = ",'
preproc = section,segment,global,extern,include,define,macro,endmacro,rep,endrep,times,equ,%define,%macro,%endmacro,%if,%ifdef,%ifndef,%endif,%else,%elif,%include,%assign,%use,%pop,%push
keywords = mov,push,pop,call,ret,jmp,je,jne,jz,jnz,jl,jg,jle,jge,jb,ja,jbe,jae,jc,jnc,jo,jno,js,jns,add,sub,mul,imul,div,idiv,and,or,xor,not,neg,shl,shr,sar,sal,rcl,rcr,rol,ror,lea,cmp,test,int,syscall,sysret,nop,hlt,inc,dec,xchg,cmpxchg,movzx,movsx,movsxd,cbw,cwd,cdq,cqo,rep,repe,repne,repz,repnz,stosb,stosd,stosq,lodsb,lodsd,lodsq,movsb,movsd,movsq,scasb,scasd,scasq,pusha,popa,pushad,popad,pushf,popf,sti,cli,cld,std,clc,stc,cmc,lahf,sahf,in,out,lock,fld,fst,fstp,fadd,fsub,fmul,fdiv,movaps,movups,addps,subps,mulps,divps,vmovaps,vaddps,vpaddq,vmulps
types = byte,word,dword,qword,oword,yword,zword,db,dw,dd,dq,dt,do,dy,dz,resb,resw,resd,resq,rest,reso,resy,resz,equ
enable_number_highlight = true
