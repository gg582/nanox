[vhdl]
extensions = vhd,vhdl
line_comment_tokens = --
string_delims = ",'
flow = if,then,elsif,else,end,case,when,others,for,loop,while,next,exit,return,wait
types = std_logic,std_logic_vector,std_ulogic,std_ulogic_vector,unsigned,signed,integer,natural,positive,boolean,bit,bit_vector,real,time,string,character,severity_level
keywords = library,use,entity,is,port,generic,map,architecture,of,begin,end,signal,variable,constant,type,subtype,process,component,package,body,procedure,function,generate,configuration,attribute,alias,assert,report,severity,all,others,open,in,out,inout,buffer,linkage,downto,to,abs,not,and,or,nand,nor,xor,xnor,mod,rem,sll,srl,sla,sra,rol,ror,after,transport,reject,inertial,unaffected,on,null,access,file,range,reverse_range,shared,impure,pure,protected,postponed,guarded,bus,register
enable_number_highlight = true
