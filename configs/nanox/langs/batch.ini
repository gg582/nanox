[batch]
extensions = bat,cmd
line_comment_tokens = ::
string_delims = ",'
flow = if,else,for,goto,call,exit,pause,choice
keywords = echo,@echo,set,call,start,cmd,cd,pushd,popd,dir,del,copy,move,ren,md,rd,type,more,find,findstr,sort,xcopy,robocopy,attrib,icacls,reg,tasklist,taskkill,net,netstat,ipconfig,ping,shutdown,schtasks,sc,wmic,powershell,defined,exist,errorlevel,cmdextversion,not,equ,neq,lss,leq,gtr,geq,in,do,tokens,delims,usebackq,skip
enable_bracket_highlight = true
