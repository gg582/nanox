[jsx]
extensions = jsx
line_comment_tokens = //
block_comment_pairs = /* */
string_delims = ",',`
flow = if,else,for,while,do,switch,case,default,break,continue,try,catch,finally,throw
types = var,let,const,function,class,new,this,super,extends,constructor,static,get,set,async,await,typeof,instanceof,void,any,unknown,never
keywords = import,from,as,export,default,package,interface,implements,private,protected,public,abstract,enum,yield,with,useState,useEffect,useContext,useRef,useCallback,useMemo,useReducer,useLayoutEffect,useImperativeHandle,useDebugValue,useDeferredValue,useTransition,useId,useSyncExternalStore,useOptimistic,useActionState,use,createContext,createRef,forwardRef,memo,lazy,Fragment,Suspense,StrictMode,createElement,cloneElement,createRoot,hydrateRoot,createPortal,startTransition,flushSync,Component,PureComponent,Children,isValidElement,act
return_keywords = return
enable_number_highlight = true
enable_bracket_highlight = true
