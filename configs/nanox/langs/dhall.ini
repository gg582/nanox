[dhall]
extensions = dhall
line_comment_tokens = --
block_comment_pairs = {- -}
string_delims = ",'
flow = if,then,else,let,in,assert,merge,toMap
types = Bool,Natural,Integer,Double,Text,Bytes,List,Optional,None,Some,Type,Kind,Sort
keywords = let,in,assert,as,using,with,forall,merge,toMap,showConstructor,missing,env,http,https,sha256,True,False,NaturalFold,NaturalBuild,NaturalIsZero,NaturalEven,NaturalOdd,ListBuild,ListFold,ListLength,ListHead,ListLast,ListIndexed,ListReverse,TextShow,TextReplace
enable_number_highlight = true
