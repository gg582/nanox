[latex]
extensions = tex,sty,cls,bib,dtx,ins
line_comment_tokens = %
string_delims = ",'
flow = if,else,fi,ifnum,iftrue,iffalse,ifdim,ifodd,ifvmode,ifhmode,ifmmode,ifinner,ifvoid,ifeof,ifcase
keywords = begin,end,usepackage,documentclass,newcommand,renewcommand,newenvironment,renewenvironment,def,let,edef,gdef,include,input,bibliography,bibliographystyle,label,ref,cite,footnote,textbf,textit,texttt,textsc,emph,section,subsection,subsubsection,chapter,part,paragraph,subparagraph,item,centering,raggedright,raggedleft,hspace,vspace,hfill,vfill,newline,linebreak,pagebreak,clearpage,tableofcontents,listoffigures,listoftables,maketitle,author,title,date,caption,figure,table,tabular,array,align,equation,enumerate,itemize,description,minipage,fbox,mbox,framebox
preproc = documentclass,usepackage,RequirePackage,LoadClass,PassOptionsToPackage,ProvidesPackage,ProvidesClass,NeedsTeXFormat
enable_bracket_highlight = true
