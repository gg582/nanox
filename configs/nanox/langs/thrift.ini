[thrift]
extensions = thrift
line_comment_tokens = //,#
block_comment_pairs = /* */
string_delims = ",'
types = bool,byte,i8,i16,i32,i64,double,string,binary,list,map,set
keywords = namespace,include,const,typedef,enum,struct,exception,service,extends,optional,required,oneway,void,throws
enable_number_highlight = true
enable_bracket_highlight = true
