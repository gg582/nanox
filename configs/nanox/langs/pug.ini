[pug]
extensions = pug,jade
line_comment_tokens = //,-//
string_delims = ",'
flow = if,else,unless,case,when,default,each,in,while,break,continue
keywords = extends,block,include,mixin,doctype,html,head,body,script,style,yield,append,prepend,title,meta,link,div,span,p,a,ul,ol,li,img,form,input,button,select,textarea,table,tr,td,th,section,article,header,footer,nav,main,aside,h1,h2,h3,h4,h5,h6
enable_bracket_highlight = true
