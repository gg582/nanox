[terraform]
extensions = tf,tfvars
line_comment_tokens = //,#
block_comment_pairs = /* */
string_delims = ",'
flow = if,else,for,in
types = string,number,bool,list,map,set,object,tuple,any
keywords = resource,data,variable,output,module,provider,terraform,required_providers,required_version,backend,locals,dynamic,content,lifecycle,depends_on,count,for_each,provisioner
enable_number_highlight = true
enable_bracket_highlight = true
