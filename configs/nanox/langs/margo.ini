[margo]
extensions = margo
line_comment_tokens = //
block_comment_pairs = /* */
string_delims = ",'
types = int,char,float,double,string,void
flow = if,else,for,while,do,switch,case,default,break,continue,goto
keywords = fn,auto,weird,alloc,alloc_and_init,@import,@style,@set
return_keywords = return
