[vimscript]
extensions = vim
file_matches = ^\.vimrc$,^vimrc$,^_vimrc$,^\.gvimrc$,^gvimrc$,^init\.vim$
line_comment_tokens = "
string_delims = ",'
flow = if,elseif,else,endif,for,endfor,while,endwhile,try,catch,finally,endtry,throw
keywords = function,endfunction,def,enddef,let,var,const,set,setlocal,map,noremap,nnoremap,vnoremap,inoremap,command,autocmd,augroup,syntax,highlight,call,execute,echo,source,runtime,silent,filetype,plugin,indent,abort
return_keywords = return
