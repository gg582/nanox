[rescript]
extensions = res,resi
line_comment_tokens = //
block_comment_pairs = /* */
string_delims = ",'
flow = if,else,switch,for,while,try,catch
types = string,int,float,bool,array,option,result,unit,char,list
keywords = let,rec,type,module,open,include,exception,external,and,fun,lazy,mutable,private,virtual,as
return_keywords = raise
enable_number_highlight = true
