[odin]
extensions = odin
line_comment_tokens = //
block_comment_pairs = /* */
string_delims = ",'
flow = if,else,when,for,switch,case,do,break,continue,return,fallthrough,defer,using
types = i8,i16,i32,i64,i128,int,u8,u16,u32,u64,u128,uint,f16,f32,f64,bool,b8,b16,b32,b64,string,cstring,rune,rawptr,uintptr,byte
keywords = proc,struct,union,enum,bit_field,bit_set,map,dynamic,distinct,package,import,foreign,using,cast,auto_cast,transmute,context,or_else,or_return,in,not_in,nil,true,false
return_keywords = return
enable_number_highlight = true
