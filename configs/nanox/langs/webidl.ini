[webidl]
extensions = webidl,idl
line_comment_tokens = //
block_comment_pairs = /* */
string_delims = ",'
types = boolean,byte,octet,short,unsigned,long,float,double,unrestricted,DOMString,ByteString,USVString,any,object,symbol,void,undefined,sequence,record,FrozenArray,ObservableArray,Promise,EventTarget,EventHandler
keywords = interface,mixin,includes,namespace,callback,typedef,enum,dictionary,partial,required,optional,attribute,readonly,inherit,static,getter,setter,deleter,stringifier,serializer,legacycaller,constructor,iterable,async,maplike,setlike,const,exception,module
enable_number_highlight = true
