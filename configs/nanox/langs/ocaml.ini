[ocaml]
extensions = ml,mli,mll,mly
block_comment_pairs = (* *)
string_delims = ",'
flow = if,then,else,match,with,when,for,to,downto,do,while,begin,end,try,raise
types = int,float,bool,char,string,bytes,unit,list,array,option,result,exn
keywords = let,in,fun,function,rec,and,type,of,module,struct,sig,functor,include,open,val,external,class,object,method,inherit,virtual,mutable,lazy,new,constraint,exception,assert
return_keywords = raise
enable_number_highlight = true
