string_delims = ",'
flow = if,else,version,debug,for,foreach,foreach_reverse,while,do,switch,case,default,break,continue,goto,with,try,catch,finally,throw,scope
types = void,bool,byte,ubyte,short,ushort,int,uint,long,ulong,cent,ucent,float,double,real,char,wchar,dchar,string,wstring,dstring,size_t,ptrdiff_t,hash_t
keywords = module,import,class,struct,interface,union,enum,template,alias,mixin,static,extern,export,package,private,protected,public,abstract,final,override,synchronized,auto,ref,out,in,lazy,const,immutable,inout,shared,pure,nothrow,nogc,property,safe,trusted,system,unittest,invariant,new,delete,null,true,false,this,super,typeid,sizeof,alignof,offsetof,init
return_keywords = return
enable_number_highlight = true
