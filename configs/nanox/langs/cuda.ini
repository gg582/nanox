[cuda]
extensions = cu,cuh
line_comment_tokens = //
block_comment_pairs = /* */
string_delims = ",'
flow = if,else,for,while,do,switch,case,default,break,continue,goto,try,catch,throw
types = void,int,char,float,double,bool,size_t,unsigned,long,short,uint8_t,uint16_t,uint32_t,uint64_t,int8_t,int16_t,int32_t,int64_t,dim3,uint3,int3,float3,float4,double3,double4,half,half2
keywords = __global__,__device__,__host__,__shared__,__constant__,__managed__,__restrict__,__forceinline__,threadIdx,blockIdx,blockDim,gridDim,warpSize,cudaMalloc,cudaMallocManaged,cudaFree,cudaMemcpy,cudaMemset,cudaSynchronize,cudaDeviceSynchronize,cudaGetErrorString,cudaLaunchKernel,__syncthreads,__syncwarp,atomicAdd,atomicSub,atomicMax,atomicMin,atomicCAS,atomicExch,atomicAnd,atomicOr,atomicXor,tex1D,tex2D,tex3D,__ldg,__ballot_sync,__shfl_sync,__shfl_up_sync,__shfl_down_sync,__shfl_xor_sync
return_keywords = return
preproc_include = include
preproc_define = define,undef
preproc_flow = ifdef,ifndef,endif,else,elif,pragma
enable_number_highlight = true
enable_bracket_highlight = true
