[scheme]
extensions = scm,ss,sls,sld
line_comment_tokens = ;
block_comment_pairs = #| |#
string_delims = ",'
flow = if,cond,else,when,unless,case,and,or,not,begin,do,let,letrec,let*
types = number,integer,real,complex,rational,string,boolean,symbol,pair,list,vector,void,null,procedure,char,port
keywords = define,lambda,let,let*,letrec,define-syntax,let-syntax,syntax-rules,quasiquote,quote,unquote,unquote-splicing,import,export,library,include,define-record-type,define-values,define-library,parameterize,dynamic-wind,with-exception-handler,raise,error,display,write,newline,read,call-with-current-continuation,call/cc,values,apply,map,for-each,filter,car,cdr,cons,list,append,vector,make-vector,vector-ref,vector-set!,string-length,string-ref,string-append,number->string,string->number,char->integer,integer->char
return_keywords = values
enable_number_highlight = true
enable_bracket_highlight = true
