[verilog]
extensions = sv,svh
line_comment_tokens = //
block_comment_pairs = /* */
string_delims = ",'
flow = if,else,case,casez,casex,endcase,for,foreach,while,repeat,forever,do,break,continue,return,fork,join,begin,end
types = bit,logic,reg,wire,int,integer,real,time,byte,shortint,longint,shortreal,string,void,enum,struct,union,interface,class,package,chandle,event
keywords = module,endmodule,input,output,inout,parameter,localparam,always,always_ff,always_comb,always_latch,initial,final,assign,generate,endgenerate,genvar,function,endfunction,task,endtask,posedge,negedge,import,export,extends,implements,virtual,static,automatic,unique,priority,unique0,inside,dist,constraint,rand,randc,solve,before,with,new,super,this,null,default,property,sequence,assert,assume,cover,restrict,bind,cross,bins,binsof,wait,disable,fork,join_any,join_none,typedef,let,var
enable_number_highlight = true
enable_bracket_highlight = true
