[sparql]
extensions = sparql,rq
line_comment_tokens = #
string_delims = ",'
flow = select,from,where,limit,offset,order,by,group,having,filter,optional,union,graph,values,minus,exists,not
types = xsd:string,xsd:integer,xsd:float,xsd:double,xsd:boolean,xsd:date,xsd:dateTime,rdf:type,rdfs:label,owl:Class
keywords = prefix,base,ask,construct,describe,distinct,reduced,as,bind,service,named,all,undef,asc,desc,str,lang,langmatches,datatype,bound,iri,uri,bnode,rand,abs,ceil,floor,round,strlen,ucase,lcase,strstarts,strends,contains,strbefore,strafter,encode_for_uri,concat,substr,replace,regex,coalesce,if,strlang,strdt,isiri,isuri,isblank,isliteral,isnumeric,count,sum,min,max,avg,sample,group_concat,separator
enable_number_highlight = true
