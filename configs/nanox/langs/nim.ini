[nim]
extensions = nim,nims
line_comment_tokens = #
block_comment_pairs = #[ ]#
string_delims = ",'
flow = if,elif,else,case,of,when,while,for,break,continue,try,except,finally,raise,do,block
types = int,int8,int16,int32,int64,uint,uint8,uint16,uint32,uint64,float,float32,float64,bool,char,string,cstring,pointer,auto,any
keywords = proc,func,method,iterator,macro,template,converter,type,var,let,const,import,include,export,from,as,object,ref,ptr,tuple,enum,concept,generic,mixin,bind,using,static,discard,nil,true,false
return_keywords = return,result
enable_number_highlight = true
