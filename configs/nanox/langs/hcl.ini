[hcl]
extensions = hcl
line_comment_tokens = //,#
block_comment_pairs = /* */
string_delims = ",'
flow = if,else,for,in
types = string,number,bool,list,map,set,object,tuple,any
keywords = resource,data,variable,output,module,provider,locals,dynamic,content,lifecycle,depends_on,count,for_each
enable_number_highlight = true
enable_bracket_highlight = true
