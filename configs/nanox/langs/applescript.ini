[applescript]
extensions = applescript,scpt
line_comment_tokens = --
block_comment_pairs = (* *)
string_delims = ",'
flow = if,then,else,end,repeat,while,until,with,times,from,to,by,exit,on,error,try,considering,ignoring
types = boolean,integer,real,text,list,record,date,alias,file,reference,class,anything
keywords = tell,set,get,make,delete,copy,move,open,close,save,quit,activate,launch,run,do,as,return,result,application,window,document,paragraph,word,character,item,element,contents,property,attribute,its,of,in,into,from,before,after,every,some,any,whose,where,script,handler,global,local,my,me,display,dialog,alert,choose,file,folder,path,shell,script,AppleScript,Finder,System,Events,Safari,Mail
return_keywords = return
