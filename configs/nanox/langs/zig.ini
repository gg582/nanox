[zig]
extensions = zig
line_comment_tokens = //
string_delims = ",'
flow = if,else,while,for,switch,break,continue,defer,errdefer
types = i8,i16,i32,i64,i128,isize,u8,u16,u32,u64,u128,usize,f16,f32,f64,f128,bool,void,anytype,anyerror,noreturn,type,comptime_int,comptime_float
keywords = fn,var,const,pub,extern,export,inline,comptime,struct,enum,union,error,test,try,catch,unreachable,undefined,null,true,false,and,or,orelse,return,import
return_keywords = return
enable_number_highlight = true
