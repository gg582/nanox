[stylus]
extensions = styl
line_comment_tokens = //
block_comment_pairs = /* */
string_delims = ",'
keywords = import,require,use,include,define,mixin,for,if,else,unless,return,and,or,not,in,true,false,null,@extend,@block,@media,@keyframes,@font-face,@supports,@import,url,rgb,rgba,hsl,hsla,darken,lighten,saturate,desaturate,opacify,mix,contrast
enable_number_highlight = true
enable_bracket_highlight = true
