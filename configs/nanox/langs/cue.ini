[cue]
extensions = cue
line_comment_tokens = //
block_comment_pairs = /* */
string_delims = ",'
flow = if,for,in,let
types = null,bool,string,bytes,int,float,number,_,top,bottom
keywords = package,import,let,if,for,in,with,and,or,not,close,open,hidden,required,optional,default,null,true,false,self,@
enable_number_highlight = true
enable_bracket_highlight = true
