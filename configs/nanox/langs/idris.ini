[idris]
extensions = idr,lidr,ipkg
line_comment_tokens = --
block_comment_pairs = {- -}
string_delims = ",'
flow = if,then,else,case,of,where,let,in,do
types = Int,Integer,Nat,Bool,Char,String,List,Vect,Maybe,Either,IO,Type,Double,Bits8,Bits16,Bits32,Bits64
keywords = module,import,data,record,interface,implementation,where,let,do,case,of,with,impossible,rewrite,partial,total,covering,public,private,export,namespace,parameters,using,mutual,auto,default,infix,infixl,infixr,prefix,proof,tactics,exact,refine,trivial,compute,believe_me,assert_total,assert_smaller
return_keywords = pure
enable_number_highlight = true
