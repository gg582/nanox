[wren]
extensions = wren
line_comment_tokens = //
block_comment_pairs = /* */
string_delims = ",'
flow = if,else,for,in,while,break,continue,return
types = Bool,Num,String,Null,List,Map,Range,Sequence,Fiber,Class,Object,System
keywords = class,construct,is,super,this,static,foreign,import,var,true,false,null,new
return_keywords = return
enable_number_highlight = true
