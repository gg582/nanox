[ant]
file_matches = ^build\.xml$,^ant\.xml$,^ivy\.xml$
block_comment_pairs = <!-- -->
string_delims = ",'
keywords = project,target,property,echo,javac,jar,copy,delete,mkdir,classpath,fileset,patternset,condition,exec,depends,basedir,taskdef,typedef,import,include,macrodef
enable_bracket_highlight = true
