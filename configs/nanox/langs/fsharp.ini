[fsharp]
extensions = fs,fsi,fsx,fsproj
line_comment_tokens = //
block_comment_pairs = (* *)
string_delims = ",'
flow = if,then,elif,else,match,with,when,for,to,downto,do,while,try,raise
types = int,float,bool,char,string,unit,list,array,option,Result,Map,Set,seq
keywords = let,in,fun,function,rec,and,type,of,module,open,val,mutable,lazy,new,inherit,interface,abstract,virtual,override,member,namespace,exception,async,do,use
return_keywords = return
enable_number_highlight = true
