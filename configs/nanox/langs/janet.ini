[janet]
extensions = janet
line_comment_tokens = #
string_delims = ",'
flow = if,cond,when,unless,while,for,each,loop,repeat,break,return,do,case,match
types = boolean,number,string,keyword,symbol,tuple,array,struct,table,buffer,fiber,function,nil,true,false
keywords = def,defn,defmacro,var,varfn,fn,do,let,set,quasiquote,quote,unquote,splice,import,use,require,os/execute,ev/spawn,fiber/new,fiber/resume,fiber/yield,thread/new,net/listen,printf,print,prin,eprin,eprint,error,errorf,assert,protect,try,catch,string/format,string/split,string/join,array/new,array/push,array/pop,table/new,struct/with,merge,keys,values,pairs,ipairs,map,filter,reduce,keep,juxt,apply,partial
return_keywords = return
enable_number_highlight = true
enable_bracket_highlight = true
