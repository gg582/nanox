[fennel]
extensions = fnl
line_comment_tokens = ;
string_delims = ",'
flow = if,when,unless,cond,match,case,while,each,for,loop,do,let
types = nil,true,false
keywords = fn,local,var,set,global,let,do,if,when,unless,cond,match,case,while,each,for,loop,macro,macros,import-macros,require,include,values,list,table.pack,table.unpack,table.insert,table.remove,table.sort,table.concat,string.format,string.sub,string.len,math.floor,math.ceil,math.abs,math.max,math.min,print,io.write,io.read,os.time,os.date,pcall,xpcall,error,tostring,tonumber,type,ipairs,pairs,rawget,rawset,rawlen,coroutine.create,coroutine.resume,coroutine.yield,coroutine.wrap
enable_number_highlight = true
enable_bracket_highlight = true
