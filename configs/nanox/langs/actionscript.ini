[actionscript]
extensions = as,mxml
line_comment_tokens = //
block_comment_pairs = /* */
string_delims = ",',`
flow = if,else,for,while,do,switch,case,default,break,continue,try,catch,finally,throw,each,in
types = void,Boolean,int,uint,Number,String,Array,Object,Class,Function,Date,RegExp,Error,XML,XMLList,QName,Namespace,Vector,Dictionary,ByteArray
keywords = import,package,class,interface,extends,implements,public,private,protected,internal,static,final,dynamic,override,native,namespace,use,new,this,super,delete,typeof,instanceof,as,is,in,var,const,function,get,set,trace,include,mx,spark,fl
return_keywords = return
enable_number_highlight = true
enable_bracket_highlight = true
