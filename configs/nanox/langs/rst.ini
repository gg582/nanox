[rst]
extensions = rst,rest
line_comment_tokens = ..
string_delims = ",'
keywords = note,warning,important,tip,caution,danger,error,hint,attention,code-block,code,highlight,literalinclude,toctree,include,image,figure,table,csv-table,list-table,rubric,topic,sidebar,section,title,subtitle,transition,field_list,bullet_list,enumerated_list,definition_list,admonition,contents,sectnum,header,footer,meta,raw,replace,unicode,date,class,role,default-role
enable_bracket_highlight = true
