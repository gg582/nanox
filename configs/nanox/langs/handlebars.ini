keywords = if,else,unless,each,with,block,partial,content,log,lookup,eq,ne,lt,gt,lte,gte,and,or,not,true,false,null,undefined,this,index,key,first,last,length,helper,data,hash,fn,inverse
enable_bracket_highlight = true
