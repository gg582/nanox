[v]
extensions = v,vv
line_comment_tokens = //
block_comment_pairs = /* */
string_delims = ",'
flow = if,else,match,for,break,continue,goto,defer,return,or
types = i8,i16,int,i64,i128,byte,u8,u16,u32,u64,u128,f32,f64,bool,rune,string,voidptr,charptr,byteptr,size_t,usize,isize
keywords = fn,mut,pub,const,struct,interface,enum,type,union,import,module,go,spawn,chan,select,lock,rlock,unsafe,asm,sql,in,is,as,or,and,not,true,false,nil,none,@
return_keywords = return
enable_number_highlight = true
