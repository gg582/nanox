[agda]
extensions = agda,lagda
line_comment_tokens = --
block_comment_pairs = {- -}
string_delims = ",'
flow = if,then,else,with,where,let,in,do
types = Set,Prop,Bool,Nat,Int,Integer,Float,Char,String,List,Maybe,Either,IO,Level,Size
keywords = module,import,open,public,private,abstract,postulate,record,data,field,constructor,inductive,coinductive,mutual,instance,primitive,syntax,infixl,infixr,infix,pattern,macro,unquote,unquoteDecl,quote,quoteTerm,variable,hiding,using,renaming,rewrite,forall,as,to,renaming
enable_number_highlight = true
