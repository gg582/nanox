[sml]
extensions = sml,sig
line_comment_tokens = #
block_comment_pairs = (* *)
string_delims = ",'
flow = if,then,else,case,of,while,let,in,end
types = int,real,bool,char,string,unit,list,option,exn,ref,array,vector
keywords = val,fun,fn,let,in,end,local,open,structure,signature,functor,struct,sig,type,datatype,abstype,exception,raise,handle,with,withtype,where,and,andalso,orelse,as,op,infix,infixr,nonfix,use,include,overload,print,hd,tl,null,length,rev,map,filter,foldl,foldr,app,all,exists,nth,take,drop,zip,unzip,substring,size,ord,chr,concat
return_keywords = raise
enable_number_highlight = true
