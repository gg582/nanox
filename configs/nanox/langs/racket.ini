[racket]
extensions = rkt,rktl,rktd
line_comment_tokens = ;
block_comment_pairs = #| |#
string_delims = ",'
flow = if,cond,else,when,unless,case,and,or,not,for,for/list,for/vector,for/hash,begin,do,let,letrec,let*
types = number,integer,real,complex,rational,string,boolean,symbol,pair,list,vector,hash,void,null,procedure,char,bytes,port,path
keywords = define,lambda,let,let*,letrec,letrec*,define-values,define-syntax,let-syntax,letrec-syntax,syntax-rules,syntax-case,quasiquote,quote,unquote,unquote-splicing,require,provide,module,module*,module+,include,define-struct,struct,match,parameterize,dynamic-wind,with-exception-handler,raise,error,display,write,newline,read,printf,fprintf,call-with-current-continuation,call/cc,values,apply,map,for-each,filter,foldl,foldr,sort,member,assoc,remove,flatten
return_keywords = values
enable_number_highlight = true
enable_bracket_highlight = true
