[asciidoc]
extensions = adoc,asc,asciidoc
line_comment_tokens = //
string_delims = ",'
keywords = NOTE,TIP,IMPORTANT,WARNING,CAUTION,ifdef,ifndef,endif,include,define,toc,toc2,leveloffset,numbered,doctype,author,email,revnumber,revdate,revremark,toclevels,source,code,listing,example,sidebar,abstract,appendix,glossary,bibliography,index,preface,dedication,colophon,image,link,xref,anchor,footnote,footnoteref,indexterm,passthrough
enable_bracket_highlight = true
