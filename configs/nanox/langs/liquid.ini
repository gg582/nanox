[liquid]
extensions = liquid
line_comment_tokens = #
string_delims = ",'
flow = if,elsif,else,unless,endif,endunless,for,in,endfor,case,when,endcase,break,continue
keywords = assign,capture,endcapture,increment,decrement,include,render,layout,extends,block,endblock,tablerow,endtablerow,paginate,endpaginate,cycle,comment,endcomment,raw,endraw,object,tag,filter
enable_bracket_highlight = true
