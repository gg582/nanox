[bicep]
extensions = bicep
line_comment_tokens = //
block_comment_pairs = /* */
string_delims = ",'
flow = if,else,for,in
types = string,int,bool,object,array,any,null
keywords = param,var,resource,module,output,targetScope,existing,import,export,type,func,metadata,decorator
enable_number_highlight = true
enable_bracket_highlight = true
