[groovy]
extensions = groovy,gradle
line_comment_tokens = //
block_comment_pairs = /* */
string_delims = ",',`
flow = if,else,for,while,do,switch,case,default,break,continue,try,catch,finally,throw
keywords = package,import,class,interface,trait,def,var,as,new,this,super,return,static,final,abstract
return_keywords = return
