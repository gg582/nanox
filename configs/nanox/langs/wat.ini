[wat]
extensions = wat,wast
line_comment_tokens = ;;
block_comment_pairs = (; ;)
string_delims = ",'
flow = if,then,else,end,loop,block,br,br_if,br_table,return,unreachable
types = i32,i64,f32,f64,funcref,externref,v128,i8x16,i16x8,i32x4,i64x2,f32x4,f64x2
keywords = module,func,type,param,result,local,global,table,memory,elem,data,import,export,start,mut,const,offset,align,drop,select,call,call_indirect,ref,struct,array,field,nop
enable_number_highlight = true
enable_bracket_highlight = true
