[commonlisp]
extensions = lisp,lsp,cl,fas,fasl
line_comment_tokens = ;
block_comment_pairs = #| |#
string_delims = ",'
flow = if,cond,when,unless,case,ecase,typecase,etypecase,and,or,not,progn,prog1,prog2,block,tagbody,go,return,return-from
types = null,symbol,number,integer,float,rational,real,complex,string,character,sequence,list,cons,vector,array,hash-table,function,package,t,nil,fixnum,bignum,short-float,single-float,double-float,long-float
keywords = defun,defmacro,defvar,defparameter,defconstant,deftype,defstruct,defclass,defmethod,defgeneric,defpackage,in-package,use-package,export,import,require,load,let,let*,flet,labels,macrolet,lambda,funcall,apply,mapcar,maplist,mapc,mapl,mapcan,format,read,print,princ,terpri,car,cdr,cons,list,append,reverse,length,nth,nthcdr,assoc,member,find,position,remove,push,pop,setf,incf,decf,loop,do,dolist,dotimes,with-open-file,multiple-values-bind,declare,special,values,ignore,ignorable,optimize,speed,safety,debug,space
return_keywords = return,return-from
enable_number_highlight = true
enable_bracket_highlight = true
