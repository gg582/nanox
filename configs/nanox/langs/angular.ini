[angular]
file_matches = \.component\.ts$,\.service\.ts$,\.module\.ts$,\.directive\.ts$,\.pipe\.ts$,\.guard\.ts$,\.interceptor\.ts$,\.resolver\.ts$,\.effect\.ts$,\.store\.ts$,\.component\.html$,\.directive\.html$
line_comment_tokens = //
block_comment_pairs = /* */
string_delims = ",',`
flow = if,else,for,while,do,switch,case,default,break,continue,try,catch,finally,throw
types = any,unknown,never,void,string,number,boolean,Observable,Subject,BehaviorSubject,ReplaySubject,Signal,WritableSignal,EventEmitter,ElementRef,TemplateRef,ViewContainerRef
keywords = import,from,as,export,default,interface,implements,private,protected,public,abstract,enum,type,declare,@Component,@Injectable,@NgModule,@Directive,@Pipe,@Input,@Output,@ViewChild,@ViewChildren,@ContentChild,@ContentChildren,@HostListener,@HostBinding,@Optional,@Self,@SkipSelf,@Inject,@Injector,selector,templateUrl,styleUrls,providers,declarations,imports,exports,bootstrap,inject,computed,effect,signal,toSignal,toObservable,pipe,map,filter,switchMap,mergeMap,concatMap,exhaustMap,catchError,takeUntil,takeUntilDestroyed,ngOnInit,ngOnChanges,ngOnDestroy,ngAfterViewInit,ngAfterContentInit,ngDoCheck,ChangeDetectionStrategy,OnPush,Router,ActivatedRoute,HttpClient,FormBuilder,FormGroup,FormControl,Validators,NgZone,ChangeDetectorRef
return_keywords = return
enable_number_highlight = true
enable_bracket_highlight = true
