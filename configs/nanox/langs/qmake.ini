string_delims = ",'
flow = if,else,error,warning,message
keywords = TEMPLATE,TARGET,SOURCES,HEADERS,INCLUDEPATH,LIBS,QT,CONFIG,DEFINES,DESTDIR,OBJECTS_DIR,MOC_DIR,RCC_DIR,UI_DIR,RESOURCES,FORMS,TRANSLATIONS,equals,contains,isEmpty,exists,include,load
enable_number_highlight = true
