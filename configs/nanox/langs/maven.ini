string_delims = ",'
keywords = groupId,artifactId,version,packaging,dependencies,dependency,build,plugins,plugin,configuration,properties,modules,module,parent,repositories,repository,profiles,profile,distributionManagement,scm,developers,licenses
enable_bracket_highlight = true
