[awk]
extensions = awk
line_comment_tokens = #
string_delims = ",'
flow = if,else,for,while,do,next,nextfile,exit,break,continue,return
types = FS,RS,OFS,ORS,NF,NR,FNR,FILENAME,ARGC,ARGV,ENVIRON
keywords = BEGIN,END,function,printf,print,getline,split,sub,gsub,match,substr,length,index,sprintf,systime,strftime,delete,close,fflush,system,pipe
return_keywords = return
enable_number_highlight = true
