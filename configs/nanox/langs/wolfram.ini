[wolfram]
extensions = wl,nb,wlt
line_comment_tokens = (*
block_comment_pairs = (* *)
string_delims = ",'
flow = If,Which,Switch,Do,For,While,NestWhile,FixedPoint,Return,Break,Continue,Throw,Catch
types = True,False,Null,None,Infinity,Indeterminate,DirectedInfinity,Complex,Real,Integer,Rational,Symbol,String,List,Association,Dataset
keywords = Module,Block,With,Function,Set,SetDelayed,Unset,Clear,ClearAll,Remove,Protect,Unprotect,Attributes,Options,Print,Echo,Map,Apply,Thread,Outer,Inner,Nest,NestList,Fold,FoldList,Select,Cases,Sort,SortBy,Reverse,Transpose,Flatten,Partition,Split,GatherBy,GroupBy,Association,Lookup,Query,Normal,Keys,Values,KeyValueMap,MapAt,MapIndexed,Scan,Table,Array,Range,Length,Dimensions,Head,Part,Append,Prepend,Join,Delete,Insert,Position,Count,Total,Mean,Variance,StandardDeviation,Correlation,LinearSolve,NullSpace,RowReduce,Eigenvalues,Eigenvectors,NDSolve,DSolve,Plot,Plot3D,ListPlot,Show,Graphics,Graphics3D,Import,Export,NotebookSave,CreateDocument
return_keywords = Return
enable_number_highlight = true
enable_bracket_highlight = true
