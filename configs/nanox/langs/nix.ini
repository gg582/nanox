[nix]
extensions = nix
line_comment_tokens = #
block_comment_pairs = /* */
string_delims = ",'
flow = if,then,else,with,let,in,assert,inherit
types = bool,int,float,string,path,null,true,false
keywords = import,rec,builtins,lib,pkgs,stdenv,mkDerivation,fetchurl,fetchgit,callPackage,makeWrapper,writeScript
enable_number_highlight = true
