[nginx]
file_matches = ^nginx\.conf$,^nginx-.*\.conf$,^.*\.nginx$
line_comment_tokens = #
string_delims = ",'
keywords = server,location,upstream,http,events,stream,mail,include,listen,server_name,root,index,proxy_pass,proxy_set_header,proxy_connect_timeout,proxy_read_timeout,proxy_send_timeout,error_page,access_log,error_log,return,rewrite,try_files,add_header,expires,gzip,ssl_certificate,ssl_certificate_key,worker_processes,worker_connections,keepalive_timeout
enable_number_highlight = true
