[puppet]
extensions = epp
file_matches = (^|/)manifests/.*\.pp$,(^|/)modules/[^/]+/manifests/.*\.pp$
line_comment_tokens = #
block_comment_pairs = /* */
string_delims = ",'
flow = if,elsif,else,unless,case,default,each,map,filter,reduce
types = String,Integer,Float,Boolean,Array,Hash,Undef,Default,Optional,Variant,Enum,Pattern,Tuple,Struct,Callable,Type,Any,Data,Scalar,Collection
keywords = class,define,node,include,contain,require,realize,inherit,import,package,service,file,exec,user,group,cron,notify,schedule,stage,function,type,attr,application,component,produces,consumes,site,ensure,enable,running,installed,present,absent,true,false,undef
return_keywords = return
enable_number_highlight = true
