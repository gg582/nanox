[vue]
extensions = vue
line_comment_tokens = //
block_comment_pairs = <!-- -->, /* */
string_delims = ",',`
flow = if,else,for,while,do,switch,case,default,break,continue,try,catch,finally,throw
types = var,let,const,function,class,new,this,super
keywords = import,from,as,export,default,defineComponent,ref,reactive,computed,watch,watchEffect,onMounted,onUnmounted,props,emit,setup,template,style,script,defineProps,defineEmits,withDefaults
return_keywords = return
enable_bracket_highlight = true
