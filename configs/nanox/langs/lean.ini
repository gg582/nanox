[lean]
extensions = lean
line_comment_tokens = --
block_comment_pairs = /- -/
string_delims = ",'
flow = if,then,else,match,with,fun,let,in,do,for,while,break,continue,return
types = Nat,Int,Float,Bool,Char,String,List,Array,Option,Except,IO,Type,Prop,Sort,Unit,Empty,UInt8,UInt16,UInt32,UInt64
keywords = def,theorem,lemma,example,axiom,constant,opaque,variable,universe,class,instance,structure,inductive,mutual,namespace,section,open,import,export,where,have,show,from,exact,apply,simp,rw,rfl,assumption,intro,intros,induction,cases,constructor,decide,native_decide,omega,ring,linarith,nlinarith,norm_num,derive,attribute,notation,macro,syntax,elab,#check,#eval,#print,#reduce
return_keywords = return
enable_number_highlight = true
