[jinja]
extensions = jinja,jinja2,j2
line_comment_tokens = #
string_delims = ",'
flow = if,elif,else,endif,for,endfor,block,endblock,with,endwith,set,raw,endraw,call,endcall,do,not,and,or
keywords = extends,include,import,from,macro,endmacro,filter,endfilter,autoescape,endautoescape,trans,endtrans,loop,self,varargs,kwargs,caller,namespace,cycle,joiner,lipsum,range,dict,undefined,true,false,none
enable_bracket_highlight = true
