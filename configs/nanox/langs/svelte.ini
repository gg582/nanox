[svelte]
extensions = svelte
line_comment_tokens = //
block_comment_pairs = <!-- -->, /* */
string_delims = ",',`
flow = if,else,for,while,do,switch,case,default,break,continue,try,catch,finally,throw,each,await,then
keywords = import,from,as,export,default,script,style,on,bind,class,use,transition,animation,store,get,set,let,reactive
return_keywords = return
enable_bracket_highlight = true
