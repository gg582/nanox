[tcl]
extensions = tcl,tk
line_comment_tokens = #
string_delims = ",'
flow = if,elseif,else,for,foreach,while,switch,case,break,continue,return,error,catch,try
types = string,list,dict,array,chan,file,namespace,package
keywords = proc,namespace,package,require,source,load,set,unset,expr,puts,gets,read,close,open,append,lappend,lindex,lrange,lreplace,lsort,lsearch,llength,split,join,format,scan,regexp,regsub,dict,array,info,global,variable,upvar,uplevel,trace,event,after,update,vwait,bind,grid,place,pack,ttk
return_keywords = return
enable_number_highlight = true
