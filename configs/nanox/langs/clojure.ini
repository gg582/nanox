[clojure]
extensions = clj,cljs,cljc,edn
line_comment_tokens = ;
string_delims = ",'
flow = if,if-not,if-let,if-some,when,when-not,when-let,cond,condp,case,do,loop,recur,for,doseq,dotimes,while
types = nil,true,false
keywords = def,defn,defmacro,deftype,defrecord,defprotocol,definterface,defmulti,defmethod,let,fn,ns,require,import,use,refer,declare,binding,try,catch,finally,throw,new
return_keywords = recur
enable_number_highlight = true
enable_bracket_highlight = true
