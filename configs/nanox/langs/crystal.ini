[crystal]
extensions = cr
line_comment_tokens = #
string_delims = ",',`
flow = if,elsif,else,unless,case,when,in,while,until,do,begin,rescue,ensure,then,break,next,return
types = Nil,Bool,Int8,Int16,Int32,Int64,UInt8,UInt16,UInt32,UInt64,Float32,Float64,Char,String,Symbol,Array,Hash,Tuple,NamedTuple,Proc,Fiber,Channel,Pointer,Slice,Range,Regex
keywords = def,class,module,struct,enum,lib,union,type,alias,include,extend,require,annotation,macro,abstract,private,protected,getter,setter,property,record,initialize
return_keywords = return
enable_number_highlight = true
