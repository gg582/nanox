[astro]
extensions = astro
line_comment_tokens = //
block_comment_pairs = <!-- -->, /* */
string_delims = ",',`
flow = if,else,for,while,do,switch,case,default,break,continue,try,catch,finally,throw
keywords = import,from,as,export,default,Astro,getStaticPaths,getStaticProps
return_keywords = return
enable_bracket_highlight = true
