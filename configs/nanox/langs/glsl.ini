[glsl]
extensions = glsl,vert,frag,geom,comp,tesc,tese,rgen,rmiss,rchit,rahit
line_comment_tokens = //
block_comment_pairs = /* */
string_delims = ",'
flow = if,else,for,while,do,switch,case,default,break,continue,return,discard
types = void,bool,int,uint,float,double,vec2,vec3,vec4,dvec2,dvec3,dvec4,ivec2,ivec3,ivec4,uvec2,uvec3,uvec4,bvec2,bvec3,bvec4,mat2,mat3,mat4,mat2x2,mat2x3,mat2x4,mat3x2,mat3x3,mat3x4,mat4x2,mat4x3,mat4x4,sampler2D,sampler3D,samplerCube,sampler2DArray,sampler2DShadow,isampler2D,usampler2D
keywords = in,out,inout,uniform,attribute,varying,const,precision,lowp,mediump,highp,layout,location,binding,set,gl_Position,gl_FragCoord,gl_PointSize,gl_VertexID,gl_InstanceID,gl_FragDepth,normalize,dot,cross,length,reflect,refract,mix,clamp,step,smoothstep,texture,texelFetch,imageLoad,imageStore,barrier,memoryBarrier
return_keywords = return
preproc = version,extension,define,include,ifdef,ifndef,endif,else,elif,undef
enable_number_highlight = true
