[coffeescript]
extensions = coffee,litcoffee
line_comment_tokens = #
block_comment_pairs = ### ###
string_delims = ",',`
flow = if,then,else,unless,when,for,while,until,loop,do,break,continue,try,catch,finally,throw,switch,case
types = null,undefined,true,false,yes,no,on,off
keywords = class,extends,super,new,this,of,in,is,isnt,not,and,or,delete,typeof,instanceof,import,export,from,as,default,async,await,yield,require
return_keywords = return
enable_triple_quotes = true
enable_number_highlight = true
