[wgsl]
extensions = wgsl
line_comment_tokens = //
string_delims = ",'
flow = if,else,switch,case,default,loop,for,while,break,continue,return,discard
types = bool,i32,u32,f32,f16,vec2,vec3,vec4,vec2f,vec3f,vec4f,vec2i,vec3i,vec4i,vec2u,vec3u,vec4u,mat2x2,mat3x3,mat4x4,mat2x2f,mat3x3f,mat4x4f,array,ptr,texture_2d,texture_3d,texture_cube,texture_storage_2d,sampler,sampler_comparison,atomic
keywords = var,let,const,override,fn,struct,alias,enable,requires,@vertex,@fragment,@compute,@location,@builtin,@group,@binding,@workgroup_size,@interpolate,@invariant,workgroupUniformLoad,textureLoad,textureSample,textureSampleBias,textureSampleLevel,textureSampleGrad,textureStore,storageBarrier,workgroupBarrier,atomicLoad,atomicStore,atomicAdd,atomicSub,atomicMax,atomicMin,atomicAnd,atomicOr,atomicXor,atomicExchange,atomicCompareExchangeWeak
return_keywords = return
preproc = enable,requires,diagnostic
enable_number_highlight = true
